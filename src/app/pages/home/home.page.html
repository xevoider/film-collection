@if (isLoading()) {
  <p>Loading films...</p>
} @else if (error(); as error) {
  <p style="color: red;">Error: {{ error }}</p>
} @else {
  <app-searchbar (searchChange)="handleSearch($event)" />

  <ul>
    @for (film of filteredFilms(); track film.id) {
      <li>{{ film.title }}</li>
    }
  </ul>
}
